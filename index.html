<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOH TV Pro — البث المباشر الاحترافي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200;300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/lucide-static@latest/font/lucide.css" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #07070d;
            --bg-secondary: #0e0e18;
            --bg-tertiary: #161624;
            --accent-purple: #8b5cf6;
            --accent-cyan: #06b6d4;
            --accent-pink: #ec4899;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
        }
        body {
            font-family: 'Inter', 'Cairo', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <script>
        const STORAGE_KEY = 'mohtv_channels';
        
        // --- ضع هنا قنواتك (Playlists) الخاصة التي تريد أن تظهر للجميع ---
        const defaultChannels = [
            {
                id: "ch_1",
                name: "القناة الأولى (مثال)",
                url: "https://test-streams.mux.dev/x3636/x3636.m3u8",
                category: "عامة",
                logo: "https://images.unsplash.com/photo-1585829365295-ab7cd400c167?w=100",
                description: "بث تجريبي للقناة الأولى"
            },
            {
                id: "ch_2",
                name: "قناة رياضية (مثال)",
                url: "https://demo.unified-streaming.com/k8s/features/stable/video/tears-of-steel/tears-of-steel.ism/.m3u8",
                category: "رياضة",
                logo: "https://images.unsplash.com/photo-1431327151626-96f8c7270f7a?w=100",
                description: "بث تجريبي للقنوات الرياضية"
            }
        ];

        // تحميل القنوات أو تعيين القنوات الافتراضية إذا لم تكن موجودة
        let channels = [];
        try {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                channels = JSON.parse(stored);
            } else {
                channels = [...defaultChannels];
                localStorage.setItem(STORAGE_KEY, JSON.stringify(channels));
            }
        } catch (e) {
            console.error("Error reading from localStorage", e);
            channels = [...defaultChannels];
        }

        function saveChannels() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(channels));
        }

        // دالة عرض القنوات المبسطة
        function renderChannels() {
            console.log("Channels loaded:", channels);
            // يمكنك إضافة الكود الخاص بتحديث واجهة المستخدم (DOM) هنا إن وجد
        }

        function renderCategories() {
            // منطق عرض الفئات
        }

        function changeLanguage(lang) {
            // منطق اللغة
        }

        // ==================== INITIALIZATION ====================\
        function init() {
            renderCategories();
            renderChannels();
            
            // Sync search inputs
            const searchInput = document.getElementById('searchInput');
            const searchInputMobile = document.getElementById('searchInputMobile');
            if(searchInput && searchInputMobile) {
                searchInput.addEventListener('input', () => searchInputMobile.value = searchInput.value);
                searchInputMobile.addEventListener('input', () => searchInput.value = searchInputMobile.value);
            }
        }

        // Run on load
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>

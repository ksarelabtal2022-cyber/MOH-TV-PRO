<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOH TV Pro — البث المباشر الاحترافي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200;300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/lucide-static@latest/font/lucide.css" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #07070d;
            --bg-secondary: #0e0e18;
            --bg-tertiary: #161624;
            --accent-purple: #8b5cf6;
            --accent-cyan: #06b6d4;
            --accent-pink: #ec4899;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
        }
        body {
            font-family: 'Inter', 'Cairo', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="bg-[var(--bg-secondary)] p-4 border-b border-white/5 flex flex-wrap justify-between items-center gap-4">
        <h1 class="text-xl font-bold text-white flex items-center gap-2">
            <i class="lucide-tv"></i> MOH TV Pro
        </h1>
        
        <div class="flex items-center gap-3 bg-[var(--bg-tertiary)] px-4 py-2 rounded-lg border border-white/10">
            <i class="lucide-upload text-[var(--accent-purple)]"></i>
            <label for="playlistFile" class="text-xs md:text-sm font-medium cursor-pointer text-white">اسحب أو اختر ملف البلاي ليست الخاص بك (M3U):</label>
            <input type="file" id="playlistFile" accept=".m3u,.m3u8" class="text-xs file:mr-4 file:py-1.5 file:px-3 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-[var(--accent-purple)] file:text-white hover:file:bg-violet-700 cursor-pointer text-transparent w-48 md:w-auto">
        </div>
    </header>

    <main class="flex-grow container mx-auto p-4 grid grid-cols-1 md:grid-cols-3 gap-6 mt-4">
        <div class="md:col-span-2 bg-[var(--bg-tertiary)] p-4 rounded-xl border border-white/10">
            <h2 class="text-lg font-semibold mb-4 border-b border-white/10 pb-2">قائمة القنوات المتاحة</h2>
            <div id="channelsList" class="grid grid-cols-2 sm:grid-cols-3 gap-4">
                </div>
        </div>

        <div class="bg-[var(--bg-secondary)] p-4 rounded-xl border border-white/10 h-fit sticky top-4">
            <h2 class="text-lg font-semibold mb-4">مشغل البث المباشر</h2>
            <div class="aspect-video bg-black rounded-lg overflow-hidden relative">
                <video id="videoPlayer" class="w-full h-full object-contain" controls autoplay playsinline></video>
            </div>
        </div>
    </main>

    <footer class="bg-[var(--bg-secondary)] text-center py-4 border-t border-white/10 mt-8 text-sm text-[var(--text-secondary)]">
        تم التصميم بواسطة MOH TV Pro
    </footer>

    <script>
        // القنوات الافتراضية (تظهر مباشرة للمستخدم بدون إجباره على رفع أي ملف)
        const defaultChannels = [
            {
                id: "ch_quran",
                name: "Saudi Quran",
                url: "http://fueg-01.xyz:80/live/2370353253/esldgs57qoigmzxzmn2s/169.m3u8",
                category: "ISLAM TV",
                logo: "http://138.199.27.237:8080/ASIA/SAUDIARABIA/SAUDIQURAN.png"
            },
            {
                id: "ch_alwan6",
                name: "Alwan Sport 6 SD",
                url: "http://fueg-01.xyz:80/live/2370353253/esldgs57qoigmzxzmn2s/1641629.m3u8",
                category: "ALWAN SPORT",
                logo: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTuhH7QXR24YA4PeJNfQRsxALFC3Sbaw_fhpg&s"
            },
            {
                id: "ch_alwan7",
                name: "Alwan Sport 7 4K",
                url: "http://fueg-01.xyz:80/live/2370353253/esldgs57qoigmzxzmn2s/1641611.m3u8",
                category: "ALWAN SPORT",
                logo: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTuhH7QXR24YA4PeJNfQRsxALFC3Sbaw_fhpg&s"
            }
        ];

        let channels = [...defaultChannels];

        // دالة تحليل ملفات M3U و M3U8 لقراءة القنوات بداخلها
        function parseM3U(m3uContent) {
            const lines = m3uContent.split('\n');
            const parsed = [];
            let currentChannel = null;

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                
                if (line.startsWith('#EXTINF:')) {
                    currentChannel = {};
                    
                    // استخراج الشعار
                    const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                    currentChannel.logo = logoMatch ? logoMatch[1] : 'https://via.placeholder.com/150/161624/ffffff?text=MOH+TV';

                    // استخراج الاسم
                    const nameMatch = line.split(',');
                    currentChannel.name = nameMatch[1] ? nameMatch[1].trim() : 'قناة غير مسماة';
                    
                    // استخراج الفئة
                    const groupMatch = line.match(/group-title="([^"]+)"/);
                    currentChannel.category = groupMatch ? groupMatch[1] : 'عامة';
                } else if (line.startsWith('http') && currentChannel) {
                    currentChannel.url = line;
                    parsed.push(currentChannel);
                    currentChannel = null; 
                }
            }
            return parsed;
        }

        // قراءة وتحميل الملف عند رفعه من الخانة العلوية
        document.getElementById('playlistFile').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const content = e.target.result;
                const loadedChannels = parseM3U(content);
                
                if (loadedChannels.length > 0) {
                    // دمج قنواتك الأساسية مع القنوات الجديدة التي تم رفعها لتصبح القائمة كاملة
                    channels = [...defaultChannels, ...loadedChannels];
                    renderChannels();
                    
                    // تشغيل أول قناة من القنوات المضافة تلقائياً
                    playChannel(channels[0].url);
                    alert('تم سحب البلاي ليست بنجاح وإضافة ' + loadedChannels.length + ' قناة جديدة!');
                } else {
                    alert('لم يتم العثور على قنوات صالحة في هذا الملف.');
                }
            };
            reader.readAsText(file);
        });

        // دالة بناء وعرض القنوات في الصفحة
        function renderChannels() {
            const container = document.getElementById('channelsList');
            container.innerHTML = '';

            if (channels.length === 0) {
                container.innerHTML = `<p class="text-[var(--text-secondary)] text-sm col-span-full text-center py-8">لا توجد قنوات متاحة.</p>`;
                return;
            }

            channels.forEach(channel => {
                const card = document.createElement('div');
                card.className = "bg-[var(--bg-primary)] p-3 rounded-lg cursor-pointer border border-white/10 hover:border-[var(--accent-purple)] transition flex flex-col items-center text-center";
                
                card.onclick = () => playChannel(channel.url);
                
                card.innerHTML = `
                    <img src="${channel.logo}" alt="${channel.name}" class="w-16 h-16 object-cover rounded-lg mb-2" onerror="this.src='https://via.placeholder.com/150'">
                    <h3 class="font-medium text-sm text-white line-clamp-1">${channel.name}</h3>
                    <span class="text-xs text-[var(--text-secondary)] mt-1 line-clamp-1">${channel.category}</span>
                `;
                container.appendChild(card);
            });
        }

        // دالة تشغيل الفيديو
        function playChannel(url) {
            const video = document.getElementById('videoPlayer');
            
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                video.play().catch(e => console.log("انقر فوق القناة للتشغيل", e));
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.play().catch(e => console.log("an انقر فوق القناة للتشغيل", e));
            }
        }

        // تهيئة التطبيق عند الدخول
        window.addEventListener('DOMContentLoaded', () => {
            renderChannels();
            if (channels.length > 0) {
                playChannel(channels[0].url);
            }
        });
    </script>
</body>
</html>
